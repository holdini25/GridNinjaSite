name: SEO deployment smoke

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Production or protected preview URL to verify
        required: true
        default: https://gridninja.ai
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --config=playwright.seo-smoke.config.ts
        env:
          SEO_SMOKE_BASE_URL: ${{ inputs.target_url }}
      - name: Capture deployed SEO evidence
        run: node scripts/seo/capture-seo-evidence.mjs
        env:
          SEO_EVIDENCE_BASE_URL: ${{ inputs.target_url }}
          SEO_EVIDENCE_DIR: test-results/seo-deployment-evidence
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-deployment-${{ github.sha }}
          path: |
            playwright-report/seo-smoke
            test-results/seo-smoke
            test-results/seo-smoke-junit.xml
            test-results/seo-deployment-evidence
          if-no-files-found: ignore
          retention-days: 30
