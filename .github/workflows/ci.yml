name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: 22

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run test:unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: coverage
          if-no-files-found: ignore

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gridninja
          POSTGRES_PASSWORD: gridninja
          POSTGRES_DB: gridninja_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gridninja -d gridninja_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run test:integration
        env:
          TEST_DATABASE_URL: postgresql://gridninja:gridninja@127.0.0.1:5432/gridninja_test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm run build

  browser:
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chrome-stable
            engine: chrome
          - project: chromium-desktop
            engine: chromium
          - project: firefox-desktop
            engine: firefox
          - project: webkit-desktop
            engine: webkit
          - project: chromium-mobile
            engine: chromium
          - project: webkit-mobile
            engine: webkit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.engine }}
      - run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: 1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-${{ matrix.project }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
